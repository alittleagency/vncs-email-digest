name: Daily PAC Intel Digest

on:
  schedule:
    # 7am ET = 12pm UTC, weekdays only (Monday-Friday)
    - cron: '0 12 * * 1-5'
  workflow_dispatch:

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure Git
        run: |
          git config --global user.email "digest@alittleagency.io"
          git config --global user.name "PAC Intel Digest Bot"

      - name: Set up environment variables
        env:
          GMAIL_CREDENTIALS_JSON: ${{ secrets.GMAIL_CREDENTIALS }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          echo "ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY" >> $GITHUB_ENV
          echo "GH_PAT=$GH_PAT" >> $GITHUB_ENV
          echo "GMAIL_APP_PASSWORD=$GMAIL_APP_PASSWORD" >> $GITHUB_ENV

          # Write Gmail credentials to file
          mkdir -p /tmp
          echo '${{ secrets.GMAIL_CREDENTIALS }}' > gmail_credentials.json

      - name: Run PAC Intel Digest pipeline
        run: python run_digest.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: pipeline-logs
          path: |
            *.log
            error.txt
